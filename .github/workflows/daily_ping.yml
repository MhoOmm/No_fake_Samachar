

name: Keep Render Active

on:
  schedule:
    - cron: '*/10 * * * *'  # Runs every 10 minutes
  workflow_dispatch:  # Allows manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -I https://no-fake-samachar.onrender.com
          
      - name: Ping Frontend
        run: |
          curl -I https://no-fake-samacharbackend.onrender.com
          
      - name: Ping MLService
        run: |
          curl -I https://no-fake-samachar-mlservice.onrender.com
